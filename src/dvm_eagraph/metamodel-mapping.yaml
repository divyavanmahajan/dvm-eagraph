      AIModel:
        node_label: ITComponent
      Hardware:
        node_label: ITComponent
      IaaS:
        node_label: ITComponent
      PaaS:
        node_label: ITComponent
      SaaS:
        node_label: ITComponent
      Service:
        node_label: ITComponent
      Software:
        node_label: ITComponent
  Initiative:
    node_label: Initiative
    subtypes:
      Epic:
        node_label: Initiative
      Idea:
        node_label: Initiative
      Program:
        node_label: Initiative
      Project:
        node_label: Initiative
  Interface:
    node_label: Interface
    subtypes:
      API:
        node_label: Interface
      LogicalInterface:
        node_label: Interface
      MCPServer:
        node_label: Interface
  Objective:
    node_label: Objective
  Organization:
    node_label: Organization
    subtypes:
      BusinessUnit:
        node_label: Organization
      Customer:
        node_label: Organization
      LegalEntity:
        node_label: Organization
      Region:
        node_label: Organization
      Team:
        node_label: Organization
  Platform:
    node_label: Platform
  Provider:
    node_label: Provider
  TechnicalStack:
    node_label: TechnicalStack
  targetMap:
    node_label: targetMap
