      BusinessProduct:
        node_label: BusinessContext
      CustomerJourney:
        node_label: BusinessContext
      Process:
        node_label: BusinessContext
      ValueStream:
        node_label: BusinessContext
  DataObject:
    node_label: DataObject
  DigitalProductHierarchy:
    node_label: DigitalProductHierarchy
  FactSheetOfUnknownType:
    node_label: FactSheetOfUnknownType
  ITComponent:
    node_label: ITComponent
