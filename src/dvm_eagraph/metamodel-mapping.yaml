# LeanIX → Neo4j metamodel mapping
# Generated: 2026-04-13
#
# factsheet_types: controls which FactSheet types are downloaded/loaded
#   and what Neo4j node label is used for each.
# relationships: maps LeanIX relation field names to Neo4j relationship types.
#
# Edit node_label and relationship values freely; re-run load_leanix.py to apply.

factsheet_types:
  Application:
    node_label: Application
    subtypes:
      AIAgent:
        node_label: Application
      BusinessAppl:
        node_label: Application
      Microservice:
        node_label: Application
  BusinessCapability:
    node_label: BusinessCapability
  BusinessContext:
    node_label: BusinessContext
